name: Post-merge

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  tag-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Extract version from build.zig.zon
        id: version
        run: |
          VERSION=$(grep -oP 'version = "\K[^"]+' build.zig.zon)
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Create tag
        run: |
          git tag ${{ steps.version.outputs.version }}
          git push origin ${{ steps.version.outputs.version }}

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.16.0

      - name: Build demo binary with ReleaseSafe
        run: zig build --release=safe

      - name: Upload demo binary
        uses: actions/upload-artifact@v4
        with:
          name: zua-${{ steps.version.outputs.version }}
          path: zig-out/bin/zua

      - name: Install mdBook
        run: |
          mkdir -p bin
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.5.2/mdbook-v0.5.2-x86_64-unknown-linux-gnu.tar.gz | tar -xz --directory=bin
          echo "$PWD/bin" >> $GITHUB_PATH

      - name: Build docs
        run: cd handbook && mdbook build

      - name: Deploy to docs-release branch
        run: |
          git push --delete origin docs-release 2>/dev/null || true
          cd handbook/book
          git init
          git add -A
          git config user.name github-actions
          git config user.email github-actions@github.com
          git commit -m "Deploy docs"
          git push --force https://${{ github.actor }}:${{ github.token }}@github.com/${{ github.repository }}.git HEAD:refs/heads/docs-release
