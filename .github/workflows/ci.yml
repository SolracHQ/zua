name: CI

on:
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Zig
        uses: mlugg/setup-zig@v1
        with:
          version: 0.16.0

      - name: Install just
        run: |
          mkdir -p bin
          curl -sSL https://github.com/casey/just/releases/download/1.40.0/just-1.40.0-x86_64-unknown-linux-gnu.tar.gz | tar -xz --directory=bin
          echo "$PWD/bin" >> $GITHUB_PATH

      - name: Run tests and build examples
        run: just all
